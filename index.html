<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>BoxControl PRO</title>

<style>

body{
font-family:Arial;
background:#f4f4f9;
margin:0;
padding:20px;
}

button{
padding:10px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.kanban{
display:flex;
gap:20px;
margin-top:20px;
}

.column{
flex:1;
background:#e2e8f0;
padding:10px;
border-radius:10px;
}

.ticket{
background:white;
padding:10px;
margin-bottom:10px;
border-radius:6px;
cursor:grab;
}

</style>

</head>

<body>

<h1>BoxControl PRO</h1>

<button onclick="novaOS()">Nova Ordem de Serviço</button>

<div class="kanban">

<div class="column" data-status="Aguardando">
<h3>Aguardando</h3>
<div class="dropzone"></div>
</div>

<div class="column" data-status="Em Serviço">
<h3>Em Serviço</h3>
<div class="dropzone"></div>
</div>

<div class="column" data-status="Finalizado">
<h3>Finalizado</h3>
<div class="dropzone"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
